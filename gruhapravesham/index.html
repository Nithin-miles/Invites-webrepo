<style>
/* ==================================================================== */
/*  THEME TOKENS — tweak colours here to restyle the whole invite       */
/* ==================================================================== */
:root{
  --maroon:#8a0f2e;
  --maroon-deep:#5c0a1f;
  --emerald:#0b5c3f;
  --emerald-deep:#063d29;
  --gold:#d4af37;
  --gold-soft:#f0d98c;
  --gold-bright:#ffe9a8;
  --marigold:#f6a01a;
  --kumkum:#c1121f;
  --cream:#fff8ec;
  --ink:#3a1015;
  --shadow:rgba(60,10,15,.35);

  --font-te-display:'Ramabhadra', 'Tiro Telugu', 'Noto Sans Telugu', sans-serif;
  --font-te-body:'Tiro Telugu', 'Noto Sans Telugu', serif;
  --font-en-display:'Marcellus', 'Cormorant Garamond', serif;
  --font-en-body:'Cormorant Garamond', Georgia, serif;
  --font-script:'Great Vibes', cursive;
}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--font-en-body);
  color:var(--cream);
  background:
    radial-gradient(1200px 600px at 50% -5%, rgba(212,175,55,.20), transparent 55%),
    linear-gradient(180deg, var(--maroon-deep) 0%, var(--maroon) 22%, #6e0c26 46%, var(--emerald) 74%, var(--emerald-deep) 100%);
  min-height:100vh;
  overflow-x:hidden;
  -webkit-tap-highlight-color:transparent;
}

/* faint mandala watermark behind everything */
body::before{
  content:"";
  position:fixed; inset:0;
  background-image:var(--mandala-bg);
  background-repeat:no-repeat;
  background-position:center 12%;
  background-size:min(760px,120vw);
  opacity:.08; pointer-events:none; z-index:0;
}

/* ---- shared decorative bits ---- */
.gold-text{
  background:linear-gradient(180deg,var(--gold-bright),var(--gold) 55%,#a9822a);
  -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent; color:var(--gold);
}
.shimmer{
  background:linear-gradient(100deg,var(--gold) 20%,#fff6d8 40%,var(--gold-bright) 50%,var(--gold) 65%);
  background-size:200% auto;
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  animation:shimmer 5s linear infinite;
}
@keyframes shimmer{to{background-position:-200% center}}

.divider{display:flex;align-items:center;justify-content:center;gap:14px;margin:26px auto;max-width:340px}
.divider svg{width:56px;height:auto;opacity:.9}
.divider .line{height:1px;flex:1;background:linear-gradient(90deg,transparent,var(--gold),transparent)}

/* ==================================================================== */
/*  OPENING GATE                                                        */
/* ==================================================================== */
#gate{
  position:fixed; inset:0; z-index:60;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:28px;
  background:
    radial-gradient(900px 500px at 50% 25%, rgba(246,160,26,.22), transparent 60%),
    linear-gradient(160deg,var(--maroon-deep),var(--emerald-deep));
  transition:opacity .9s ease, visibility .9s;
}
#gate.hidden{opacity:0; visibility:hidden}
.gate-toranam{width:min(520px,92vw); margin-bottom:6px}
.gate-om{width:78px;height:78px;margin:8px auto 14px;filter:drop-shadow(0 3px 10px rgba(0,0,0,.4))}
.gate-invoc{font-family:var(--font-te-body); font-size:clamp(1rem,4.4vw,1.35rem); letter-spacing:.5px; color:var(--gold-bright); margin-bottom:8px}
.gate-kicker{font-family:var(--font-en-display); letter-spacing:.42em; text-transform:uppercase; font-size:clamp(.62rem,2.6vw,.8rem); color:var(--gold-soft); opacity:.9}
.gate-title-te{font-family:var(--font-te-display); font-size:clamp(1.9rem,8.5vw,3.2rem); line-height:1.15; margin:10px 0 2px}
.gate-title-en{font-family:var(--font-en-display); letter-spacing:.14em; text-transform:uppercase; font-size:clamp(.85rem,3.6vw,1.15rem); color:var(--cream)}
.gate-names{font-family:var(--font-script); font-size:clamp(1.8rem,8vw,2.8rem); color:var(--gold-bright); margin:16px 0 4px}
.open-btn{
  margin-top:26px; cursor:pointer; border:none; position:relative;
  font-family:var(--font-en-display); letter-spacing:.22em; text-transform:uppercase;
  font-size:clamp(.72rem,3vw,.9rem); color:var(--maroon-deep);
  padding:15px 38px; border-radius:999px;
  background:linear-gradient(180deg,var(--gold-bright),var(--gold) 60%,#b5892c);
  box-shadow:0 10px 26px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.6);
  animation:pulse 2.4s ease-in-out infinite;
}
.open-btn:active{transform:translateY(1px)}
.open-btn .te{display:block; font-family:var(--font-te-body); letter-spacing:normal; text-transform:none; font-size:1.05em; margin-bottom:2px}
@keyframes pulse{0%,100%{box-shadow:0 10px 26px rgba(0,0,0,.4), 0 0 0 0 rgba(246,160,26,.55)}50%{box-shadow:0 10px 26px rgba(0,0,0,.4), 0 0 0 16px rgba(246,160,26,0)}}

/* ==================================================================== */
/*  MAIN INVITE                                                         */
/* ==================================================================== */
#invite{position:relative; z-index:1; max-width:760px; margin:0 auto; padding:0 20px 60px}
#invite.pre{opacity:0}
#invite.reveal{animation:riseIn 1.1s ease .1s both}
@keyframes riseIn{from{opacity:0; transform:translateY(28px)}to{opacity:1; transform:none}}

.toranam-top{width:100%; max-width:760px; display:block; margin:0 auto}

section{
  position:relative; text-align:center;
  padding:38px clamp(18px,5vw,44px);
  margin:26px 0;
  border-radius:22px;
  background:linear-gradient(180deg, rgba(46,6,16,.55), rgba(6,30,22,.55));
  border:1px solid rgba(212,175,55,.40);
  box-shadow:0 14px 40px rgba(0,0,0,.38), inset 0 0 0 1px rgba(212,175,55,.10), inset 0 0 60px rgba(212,175,55,.06);
}
/* kolam corners on cards */
.card-kolam::before,.card-kolam::after{
  content:""; position:absolute; width:46px; height:46px;
  background:var(--kolam-corner) center/contain no-repeat; opacity:.85;
}
.card-kolam::before{top:10px; left:10px}
.card-kolam::after{bottom:10px; right:10px; transform:rotate(180deg)}

.kicker{font-family:var(--font-en-display); letter-spacing:.4em; text-transform:uppercase; font-size:.72rem; color:var(--gold-soft); opacity:.85}
h1,h2,h3{font-weight:600; line-height:1.2}
.event-te{font-family:var(--font-te-display); font-size:clamp(2rem,9vw,3.4rem); margin:8px 0 2px}
.event-en{font-family:var(--font-en-display); letter-spacing:.16em; text-transform:uppercase; font-size:clamp(.9rem,3.8vw,1.25rem); color:var(--cream)}
.names-script{font-family:var(--font-script); font-size:clamp(2.4rem,11vw,4rem); line-height:1.05; margin:14px 0 4px}
.names-te{font-family:var(--font-te-display); font-size:clamp(1.3rem,6vw,2rem)}

.om-emblem{width:96px;height:96px;margin:6px auto 4px; display:block; filter:drop-shadow(0 4px 12px rgba(0,0,0,.4))}
.ganesh-medallion{
  border-radius:50%; margin:0 auto; overflow:hidden;
  display:flex; align-items:center; justify-content:center;
  background:radial-gradient(circle at 50% 38%, #fffdf6, #f3e2b0 78%, #e6cf8f);
  border:4px solid var(--gold);
  box-shadow:0 10px 26px rgba(0,0,0,.5), inset 0 0 0 2px rgba(255,255,255,.6), 0 0 0 8px rgba(212,175,55,.15);
}
.ganesh-medallion img{width:100%; height:100%; object-fit:cover; object-position:center 42%}
.invoc-te{font-family:var(--font-te-body); font-size:clamp(1.05rem,4.6vw,1.4rem); color:var(--gold-bright); margin-top:4px}
.invoc-en{font-family:var(--font-en-body); font-style:italic; font-size:clamp(.9rem,3.6vw,1.05rem); opacity:.85; margin-top:4px}

.msg{font-family:var(--font-en-body); font-size:clamp(1.05rem,4.4vw,1.3rem); line-height:1.9; max-width:560px; margin:0 auto}
.msg .te{display:block; font-family:var(--font-te-body); margin-bottom:16px; color:var(--gold-bright)}

/* Save the date */
.std-row{display:flex; align-items:center; justify-content:center; gap:clamp(14px,5vw,34px); margin:18px 0 10px}
.std-day{font-family:var(--font-en-display); font-size:clamp(3.4rem,16vw,6rem); line-height:1}
.std-mid{display:flex; flex-direction:column; gap:6px}
.std-month{font-family:var(--font-en-display); letter-spacing:.3em; text-transform:uppercase; font-size:clamp(1rem,4.5vw,1.5rem)}
.std-month .te{font-family:var(--font-te-display); letter-spacing:normal; display:block; font-size:.8em}
.std-year{font-family:var(--font-en-display); font-size:clamp(1.4rem,6vw,2rem)}
.std-sub{font-family:var(--font-te-body); font-size:clamp(1rem,4.4vw,1.25rem); color:var(--gold-bright); margin-top:6px}
.std-sub .en{display:block; font-family:var(--font-en-body); font-style:italic; color:var(--cream); opacity:.85; font-size:.9em; margin-top:2px}

/* Countdown */
.countdown{display:flex; justify-content:center; gap:clamp(8px,3vw,18px); margin-top:20px; flex-wrap:wrap}
.cd-box{
  min-width:clamp(62px,18vw,84px); padding:14px 8px; border-radius:14px;
  background:linear-gradient(180deg, rgba(212,175,55,.16), rgba(0,0,0,.22));
  border:1px solid rgba(212,175,55,.35);
}
.cd-num{font-family:var(--font-en-display); font-size:clamp(1.6rem,7vw,2.4rem); line-height:1}
.cd-lbl{font-family:var(--font-en-display); letter-spacing:.18em; text-transform:uppercase; font-size:.6rem; margin-top:6px; opacity:.85}

/* Venue */
.venue-name{font-family:var(--font-te-display); font-size:clamp(1.5rem,7vw,2.2rem)}
.venue-name .en{display:block; font-family:var(--font-en-display); letter-spacing:.06em; text-transform:uppercase; font-size:.5em; color:var(--cream); opacity:.85; margin-top:6px}
.venue-addr{font-family:var(--font-en-body); font-size:clamp(1rem,4.2vw,1.2rem); line-height:1.7; margin:14px auto; max-width:460px; opacity:.92}
.placeholder-note{display:inline-block; margin:6px auto; padding:2px 10px; border:1px dashed rgba(212,175,55,.6); border-radius:8px; font-size:.85rem; color:var(--gold-soft); opacity:.9}
.map-btn{
  display:inline-flex; align-items:center; gap:10px; margin-top:16px; cursor:pointer; text-decoration:none;
  font-family:var(--font-en-display); letter-spacing:.14em; text-transform:uppercase; font-size:.82rem;
  color:var(--maroon-deep); padding:13px 26px; border-radius:999px;
  background:linear-gradient(180deg,var(--gold-bright),var(--gold) 60%,#b5892c);
  box-shadow:0 8px 22px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.5);
  transition:transform .15s ease;
}
.map-btn:active{transform:translateY(1px)}
.map-btn svg{width:20px;height:20px}
.map-btn .te{font-family:var(--font-te-body); letter-spacing:normal; text-transform:none}

/* House / photo emblem */
.hero-figure{width:min(320px,80vw); margin:18px auto 4px; display:block; filter:drop-shadow(0 10px 24px rgba(0,0,0,.4))}
.couple-photo{width:min(300px,72vw); aspect-ratio:1/1; object-fit:cover; border-radius:50%; margin:18px auto 6px; display:block; border:5px solid var(--gold); box-shadow:0 12px 30px rgba(0,0,0,.45)}

/* Footer blessing */
.blessing{text-align:center; padding:30px 20px 10px}
.blessing .en{font-family:var(--font-script); font-size:clamp(1.8rem,8vw,2.8rem); color:var(--gold-bright)}
.blessing .te{font-family:var(--font-te-body); font-size:clamp(1rem,4.4vw,1.25rem); margin-top:8px; color:var(--cream); opacity:.9}
.credit{text-align:center; font-family:var(--font-en-body); font-size:.8rem; opacity:.55; margin-top:26px; letter-spacing:.08em}

/* Diyas row */
.diyas{display:flex; justify-content:center; gap:clamp(18px,7vw,44px); margin:6px 0 2px}
.diya{width:56px; height:auto}
.flame{transform-origin:center bottom; animation:flicker 1.6s ease-in-out infinite}
.diya:nth-child(2) .flame{animation-delay:.4s}
.diya:nth-child(3) .flame{animation-delay:.8s}
@keyframes flicker{0%,100%{transform:scaleY(1) rotate(-1deg); opacity:1}50%{transform:scaleY(.86) rotate(2deg); opacity:.85}}

/* Falling petals */
.petal{position:fixed; top:-40px; z-index:2; pointer-events:none; will-change:transform,opacity}
@keyframes fall{
  0%{transform:translateY(-40px) rotate(0deg); opacity:0}
  10%{opacity:.95}
  100%{transform:translateY(105vh) rotate(540deg); opacity:.15}
}

@media (prefers-reduced-motion:reduce){
  *{animation:none!important}
}
</style>
</head>
<body>

<!-- ==================================================================== -->
<!--  OPENING GATE                                                        -->
<!-- ==================================================================== -->
<div id="gate">

</div>

<!-- ==================================================================== -->
<!--  MAIN INVITE                                                         -->
<!-- ==================================================================== -->
<main id="invite" class="pre">

  <svg class="toranam-top" id="toranamTop" viewBox="0 0 760 64" aria-hidden="true"></svg>

  <!-- HERO -->
  <section class="card-kolam">
    <div class="om-emblem" id="heroOm"></div>
    <div class="invoc-te shimmer" data-cfg="invocationTe"></div>
    <div class="invoc-en" data-cfg="invocationEn"></div>

    <div class="kicker" data-cfg="cordially"></div>
    <h1 class="event-te gold-text" data-cfg="eventTe"></h1>
    <div class="event-en" data-cfg="eventEn"></div>
    <div class="names-script shimmer" data-cfg="namesScript"></div>
    <div class="names-te gold-text" data-cfg="namesTe"></div>

         If left blank, the decorative house-with-diyas below is shown instead. -->
    <div id="heroMediaSlot"></div>

  <!-- MESSAGE -->
  <section>

      <span class="te" data-cfg="messageTe"></span>
      <span data-cfg="messageEn"></span>

  <!-- SAVE THE DATE -->
  <section class="card-kolam">
    <div class="kicker" data-cfg="saveTheDate"></div>
    <div class="std-row">
      <div class="std-day gold-text" data-cfg="dateDay"></div>
      <div class="std-mid">
        <div class="std-month"><span data-cfg="monthEn"></span><span class="te gold-text" data-cfg="monthTe"></span></div>
        <div class="std-year gold-text" data-cfg="dateYear"></div>
      </div>
    </div>
    <div class="std-sub">
      <span data-cfg="daySub"></span>
      <span class="en" data-cfg="timeLine"></span>

  <!-- COUNTDOWN -->
  <section>

      <div class="cd-box"><div class="cd-num" id="cd-days">--</div><div class="cd-lbl" data-cfg="lblDays"></div></div>

      <div class="cd-box"><div class="cd-num" id="cd-secs">--</div><div class="cd-lbl" data-cfg="lblSecs"></div></div>
    </div>
  </section>

  <!-- VENUE -->
  <section class="card-kolam">
    <div class="kicker" data-cfg="venueLabel"></div>
    <div class="divider"><span class="line"></span><span id="div3"></span><span class="line"></span></div>
    <div class="venue-name gold-text">
      <span data-cfg="venueNameTe"></span>
      <span class="en" data-cfg="venueNameEn"></span>
    </div>
    <div class="venue-addr" data-cfg="venueAddress"></div>
    <span class="placeholder-note" id="venueNote" data-cfg="venueNote"></span>
    <br />
    <a class="map-btn" id="mapBtn" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <span data-cfg="mapBtnEn"></span>
    </a>
  </section>

  <!-- FOOTER BLESSING -->
  <div class="blessing">
    <div class="diyas" id="diyaRow2"></div>
    <div class="en" data-cfg="blessingEn"></div>
    <div class="te" data-cfg="blessingTe"></div>
    <div class="credit" data-cfg="credit"></div>
  </div>

</main>

// Toranam / marigold garland (repeating hanging marigolds + mango leaves)
function buildToranam(svg, w){
  const n = Math.round(w/38);
  let s = `<path d="M0 8 Q${w/2} 30 ${w} 8" fill="none" stroke="#0b5c3f" stroke-width="2"/>`;
  for(let i=0;i<=n;i++){
    const x = (w/n)*i;
    const y = 8 + Math.sin(Math.PI*i/n)*22*0.35 + Math.sin(Math.PI*(x/w))*0; // slight sag
    const sag = 8 + (22*Math.sin(Math.PI*(i/n)));
    const yy = 8 + (12 - Math.abs(i-n/2)/(n/2)*12) + Math.sin(Math.PI*(i/n))*4;
    // marigold
    const cy = 8 + Math.sin(Math.PI*(i/n))*18 + 26;
    const col = i%2? '#f6a01a':'#ffb733';
    s += `<g transform="translate(${x} ${8+Math.sin(Math.PI*(i/n))*18})">`;
    // mango leaf
    if(i%2===0) s += `<path d="M0 0 q6 14 0 26 q-6 -12 0 -26Z" fill="#0b5c3f"/>`;
    // marigold flower
    s += Array.from({length:8}).map((_,k)=>`<circle cx="${Math.cos(k*0.785)*6}" cy="${26+Math.sin(k*0.785)*6}" r="4.4" fill="${col}"/>`).join('');
    s += `<circle cx="0" cy="26" r="4.5" fill="#c1121f"/></g>`;
  }
  svg.innerHTML = s;
}
buildToranam(document.querySelector('.gate-toranam'), 520);

/* ---- Countdown ---- */
const target = new Date(config.targetYear, config.targetMonth-1, config.targetDay, config.targetHour, config.targetMinute, 0).getTime();
function pad(n){return String(n).padStart(2,'0');}
function tick(){
  const diff = target - Date.now();
  const el = id=>document.getElementById(id);
  if(diff<=0){
    el('cd-days').textContent='00'; el('cd-hours').textContent='00'; el('cd-mins').textContent='00'; el('cd-secs').textContent='00';
    document.querySelector('[data-cfg="countdownLabel"]')?.replaceChildren(document.createTextNode('శుభ గృహప్రవేశం · Today!'));
    return;
  }
  const d=Math.floor(diff/86400000);
  const h=Math.floor(diff%86400000/3600000);
  const m=Math.floor(diff%3600000/60000);
  const s=Math.floor(diff%60000/1000);
  el('cd-days').textContent=pad(d); el('cd-hours').textContent=pad(h); el('cd-mins').textContent=pad(m); el('cd-secs').textContent=pad(s);
}
tick(); setInterval(tick,1000);

/* ---- Falling marigold petals ---- */
const petalColors=['#f6a01a','#ffb733','#ffcf4d','#c1121f','#e8531a'];
function petal(){
  if(document.hidden) return;
  const p=document.createElement('div'); p.className='petal';
  const size=8+Math.random()*10;
  p.style.left=Math.random()*100+'vw';
  const c=petalColors[Math.floor(Math.random()*petalColors.length)];
  p.innerHTML=`<svg width="${size*2}" height="${size*2}" viewBox="0 0 20 20"><path d="M10 1 C15 6 15 12 10 19 C5 12 5 6 10 1Z" fill="${c}"/></svg>`;
  p.style.animation=`fall ${6+Math.random()*6}s linear forwards`;
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),13000);
}
let petalTimer=null;
function startPetals(){ if(!petalTimer) petalTimer=setInterval(petal,650); }

/* ---- Petal / confetti burst on open ---- */
function burst(){
  for(let i=0;i<70;i++){
    setTimeout(()=>{
      const p=document.createElement('div'); p.className='petal';
      const size=8+Math.random()*12;
      p.style.left=(30+Math.random()*40)+'vw'; p.style.top='30vh';
      const c=petalColors[Math.floor(Math.random()*petalColors.length)];
      p.innerHTML=`<svg width="${size*2}" height="${size*2}" viewBox="0 0 20 20"><path d="M10 1 C15 6 15 12 10 19 C5 12 5 6 10 1Z" fill="${c}"/></svg>`;
      p.style.animation=`fall ${4+Math.random()*4}s ease-in forwards`;
      document.body.appendChild(p); setTimeout(()=>p.remove(),9000);
    }, i*18);
  }
}

/* ---- Open gate ---- */
const gate=document.getElementById('gate');
const invite=document.getElementById('invite');
document.getElementById('openBtn').addEventListener('click',()=>{
  burst();
  gate.classList.add('hidden');
  invite.classList.remove('pre'); invite.classList.add('reveal');
  startPetals();
  setTimeout(()=>{ if(gate.parentNode) gate.style.display='none'; },1000);
});
</script>
